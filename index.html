<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMCT-Ghana Methodist Church of Toronto – Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="display-body">

  <!-- ── HEADER ─────────────────────────────────── -->
  <header class="display-header">
    <div class="hd-left">
      <span class="cross-icon" id="hd-cross">✝</span>
      <img class="church-logo hidden" id="hd-logo" alt="Church logo" />
    </div>
    <div class="hd-center">
      <h1 class="church-name" id="disp-church-name">GMCT-Ghana Methodist Church of Toronto</h1>
      <p class="church-tagline" id="disp-church-tagline">Upcoming Programs and Social Activities</p>
    </div>
    <div class="hd-right">
      <div class="live-time" id="live-time">12:00:00 PM</div>
      <div class="live-date" id="live-date">Sunday, January 1, 2026</div>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────── -->
  <main class="display-main">

    <!-- Upcoming Programs -->
    <section class="display-panel">
      <div class="panel-header">
        <h2>Upcoming Programs</h2>
      </div>
      <div class="panel-body" id="programs-list">
        <div class="no-content">No upcoming programs yet</div>
      </div>
    </section>

    <!-- Social Activities (or Hall of Fame Leaders) -->
    <section class="display-panel" id="second-panel-wrapper">
      <div class="panel-header">
        <span id="second-panel-icon">🎉</span>
        <h2 id="second-panel-title">Social Activities</h2>
      </div>
      <div class="panel-body" id="social-or-leaders-list">
        <div class="no-content" id="second-panel-empty">No upcoming social activities</div>
      </div>
    </section>

    <div id="theme-year-overlay" class="theme-year-overlay hidden">
      <img id="theme-year-image" class="theme-year-image" alt="Theme of the Year" />
    </div>

    <div id="weekly-video-overlay" class="weekly-video-overlay hidden">
      <video id="weekly-video-player" class="weekly-video-player" preload="auto" playsinline loop></video>
      <div id="weekly-video-title" class="weekly-video-title hidden"></div>
    </div>

  </main>

  <!-- ── TICKER ─────────────────────────────────── -->
  <footer class="display-footer">
    <div class="ticker-badge">ANNOUNCEMENTS</div>
    <div class="ticker-track">
      <div class="ticker-text" id="ticker-text"></div>
    </div>
    <div id="network-status" class="network-status online" aria-live="polite">ONLINE</div>
    <div class="donor-note">Display TV Donated by<br>Bro Akwasi Okyere<br>&amp; Family</div>
    <a href="admin.html" class="admin-link" title="Admin Panel" id="admin-link">⚙</a>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
